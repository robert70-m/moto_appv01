{% extends "base.html" %}

{% block content %}

<div id="mensaje-alerta" style="display:none;" class="alerta">
    <span id="texto-alerta"></span>
</div>

<div class="card">
    <h2>Pedir Moto 🏍️</h2>

    {% if request.args.get('error') %}
    <div style="background: #fdeaea; color: #e74c3c; padding: 12px; border-radius: 8px; border: 1px solid #f5c6cb; font-weight: bold; text-align: center; margin: 10px;">
        {{ request.args.get('error') }}
    </div>
    {% endif %}

    <form action="{{ url_for('pedir_viaje') }}" method="POST">
        <input type="text" id="input_origen" name="origen" placeholder="Detectando ubicación..." readonly required>
        <input type="text" id="input_destino" name="destino" placeholder="Selecciona destino" readonly required>

        <input type="hidden" id="lat" name="lat">
        <input type="hidden" id="lng" name="lng">
        <input type="hidden" id="lat_destino" name="lat_destino">
        <input type="hidden" id="lng_destino" name="lng_destino">

        <button type="submit">Pedir viaje 🚀</button>
    </form>

    {% if viaje_id %}
    <a id="btn-cancelar" href="{{ url_for('cancelar_viaje', viaje_id=viaje_id) }}">
        <button style="background:#e74c3c;color:white;width:100%;">
            ❌ Cancelar Viaje
        </button>
    </a>
    {% endif %}
</div>

<!-- ESTADO DEL VIAJE -->
<div id="status_conductor" style="display:none; padding:15px; background:#d4edda; border-radius:10px; margin:10px 0;">
    <p id="estado" style="font-weight:bold;">Esperando viaje...</p>

    <p>👤 Conductor: <span id="nombre_en_pantalla"></span></p>
    <p>🔢 Unidad: <span id="unidad_en_pantalla"></span></p>
    <p>🎨 Color: <span id="color_en_pantalla"></span></p>

    <p>Estado: <span id="texto_estado"></span></p>
</div>

<div id="map" style="height:450px;"></div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    let map, markerUser, markerDest;
    let first = true;
    let alertShown = false;
    let running = false;

    function alertaCerca() {
        let div = document.createElement("div");
        div.innerText = "🚨 Conductor cerca";
        div.style = "position:fixed;top:80px;left:50%;transform:translateX(-50%);background:green;color:#fff;padding:10px;border-radius:20px;z-index:9999;";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 4000);
    }

    function initMap(lat, lng) {
        if (map) return;

        map = L.map('map').setView([lat, lng], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        map.on("click", e => {
            document.getElementById("lat_destino").value = e.latlng.lat;
            document.getElementById("lng_destino").value = e.latlng.lng;
            document.getElementById("input_destino").value = "Destino marcado";
        });
    }

    // GPS
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {

            let lat = pos.coords.latitude;
            let lng = pos.coords.longitude;

            document.getElementById("lat").value = lat;
            document.getElementById("lng").value = lng;
            document.getElementById("input_origen").value = "Ubicación OK";

            if (!map) initMap(lat, lng);

            if (!markerUser) {
                markerUser = L.marker([lat, lng]).addTo(map);
            } else {
                markerUser.setLatLng([lat, lng]);
            }

            if (first) {
                map.setView([lat, lng], 16);
                first = false;
            }

        }, () => {
            document.getElementById("input_origen").value = "Activa GPS";
        });
    }

    // 🔥 SOLO UN CONTROL DE VIAJE
    function vigilar() {

        if (running) return;
        running = true;

        const id = "{{ viaje_id }}";
        const cancel = document.getElementById("btn-cancelar");

        if (!id || id === "None") {
            document.getElementById("status_conductor").style.display = "none";
            running = false;
            return;
        }

        fetch(`/api_estado_viaje/${id}`)
        .then(r => r.json())
        .then(d => {

            let estado = document.getElementById("estado");
            let cont = document.getElementById("status_conductor");

            if (d.estado === "finalizado") {
                estado.innerText = "Viaje finalizado";
                cont.style.display = "none";
                if (cancel) cancel.style.display = "none";
                return;
            }

            if (["aceptado","en_camino","recogido","cerca"].includes(d.estado)) {

                cont.style.display = "block";

                document.getElementById("nombre_en_pantalla").innerText = d.conductor || "";
                document.getElementById("unidad_en_pantalla").innerText = d.unidad || "N/A";
                document.getElementById("color_en_pantalla").innerText = d.color || "N/A";

                if (cancel) cancel.style.display = "none";

                if (d.estado === "cerca") {
                    if (!alertShown) {
                        alertaCerca();
                        alertShown = true;
                    }
                    document.getElementById("texto_estado").innerText = "Cerca 🚨";
                } else {
                    alertShown = false;
                    document.getElementById("texto_estado").innerText = d.estado;
                }

                estado.innerText = d.estado;
            }

            if (d.estado === "pendiente") {
                if (cancel) cancel.style.display = "block";
            }

        })
        .finally(() => running = false);
    }

    setInterval(vigilar, 3000);
    vigilar();

});
</script>

{% endblock %}
