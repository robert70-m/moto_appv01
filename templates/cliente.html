{% extends "base.html" %} 

{% block content %}

<div id="mensaje-alerta" style="display:none;" class="alerta">
    <span id="texto-alerta"></span>
</div>

<div class="card">
    <h2>Pedir Moto 🏍️</h2>

    {% if request.args.get('error') %}
    <div style="background: #fdeaea; color: #e74c3c; padding: 12px; border-radius: 8px; border: 1px solid #f5c6cb; font-weight: bold; text-align: center; margin: 10px;">
        {{ request.args.get('error') }}
    </div>
    {% endif %}

    <form action="{{ url_for('pedir_viaje') }}" method="POST">
        <label>Punto de partida:</label>
        <input type="text" id="input_origen" name="origen" placeholder="Detectando ubicación..." readonly required>

        <label>Destino:</label>
        <input type="text" id="input_destino" name="destino" placeholder="Selecciona destino en el mapa" readonly required>

        <input type="hidden" id="lat" name="lat">
        <input type="hidden" id="lng" name="lng">
        <input type="hidden" id="lat_destino" name="lat_destino">
        <input type="hidden" id="lng_destino" name="lng_destino">

        <button type="submit">Pedir viaje 🚀</button>
    </form>

    {% if viaje_id %}
    <div id="contenedor-cancelar">
        <a id="btn-cancelar" href="{{ url_for('cancelar_viaje', viaje_id=viaje_id) }}"
           onclick="return confirm('¿Seguro que deseas cancelar el viaje?')">
            <button style="margin-top:10px;background:#e74c3c;color:white;padding:12px;border:none;border-radius:6px;width:100%;">
                ❌ Cancelar Viaje
            </button>
        </a>
    </div>
    {% endif %}
</div>

<div id="status_conductor" style="display:none; padding:15px; background:#d4edda; border-radius:10px; margin:10px 0; border:1px solid #c3e6cb;">
    <h3 id="estado_titulo">Esperando viaje...</h3>
    <hr>
    <p>👤 <strong>Conductor:</strong> <span id="nombre_en_pantalla">...</span></p>
    <p>🔢 <strong>Unidad:</strong> <span id="unidad_en_pantalla">...</span></p>
    <p>🎨 <strong>Color:</strong> <span id="color_en_pantalla">...</span></p>
    <p>📍 <strong>Estado actual:</strong> <span id="texto_estado">Buscando...</span></p>
</div>

<div class="card">
    <div id="map" style="height:450px;"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {

    let map = null;
    let marcadorUsuario = null;
    let marcadorDestino = null;
    let primeraVez = true;
    let alertaMostrada = false;
    let ejecutando = false;

    const iconoCliente = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
        iconSize: [35,35]
    });

    const iconoDestino = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/447/447031.png',
        iconSize: [35,35]
    });

    function alertaCerca() {
        let div = document.createElement("div");
        div.innerText = "🚨 ¡Tu conductor está muy cerca!";
        div.style = "position:fixed;top:80px;left:50%;transform:translateX(-50%);background:#27ae60;color:#fff;padding:15px;border-radius:20px;z-index:9999;";
        document.body.appendChild(div);
        setTimeout(() => div.remove(), 5000);
    }

    function initMap(lat, lng) {
        if (map) return;

        map = L.map('map').setView([lat, lng], 16);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('click', function(e) {
            let latD = e.latlng.lat;
            let lngD = e.latlng.lng;

            document.getElementById("lat_destino").value = latD;
            document.getElementById("lng_destino").value = lngD;
            document.getElementById("input_destino").value = "Destino seleccionado ✅";

            if (marcadorDestino) {
                marcadorDestino.setLatLng([latD, lngD]);
            } else {
                marcadorDestino = L.marker([latD, lngD], {icon: iconoDestino}).addTo(map);
            }
        });
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(function(pos) {
            let lat = pos.coords.latitude;
            let lng = pos.coords.longitude;

            document.getElementById("lat").value = lat;
            document.getElementById("lng").value = lng;
            document.getElementById("input_origen").value = "Ubicación detectada ✅";

            if (!map) initMap(lat, lng);

            if (marcadorUsuario) {
                marcadorUsuario.setLatLng([lat, lng]);
            } else {
                marcadorUsuario = L.marker([lat, lng], {icon: iconoCliente}).addTo(map);
            }

            if (primeraVez) {
                map.setView([lat, lng], 16);
                primeraVez = false;
            }
        });
    }

    // 🔥 FUNCIÓN PRINCIPAL CORRECTA
    window.vigilarViaje = function() {

        const viajeId = "{{ viaje_id }}";

        if (!viajeId || viajeId === "None" || viajeId === "") {
            document.getElementById("status_conductor").style.display = "none";
            return;
        }

        if (ejecutando) return;
        ejecutando = true;

        fetch(`/api_estado_viaje/${viajeId}`)
        .then(r => r.json())
        .then(d => {

            const panel = document.getElementById("status_conductor");

            if (d.estado === "finalizado" || d.estado === "cancelado") {
                panel.style.display = "block";

                document.getElementById("estado_titulo").innerText =
                    d.estado === "finalizado" ? "Viaje terminado 🏁" : "Viaje cancelado ❌";

                document.getElementById("texto_estado").innerText = "Redirigiendo...";

                setTimeout(() => location.reload(), 4000);
                return;
            }

            if (["aceptado","en_camino","recogido","cerca"].includes(d.estado)) {

                panel.style.display = "block";

                document.querySelector("form").style.display = "none";
                const btn = document.getElementById("contenedor-cancelar");
                if (btn) btn.style.display = "none";

                document.getElementById("nombre_en_pantalla").innerText = d.conductor;
                document.getElementById("unidad_en_pantalla").innerText = d.unidad;
                document.getElementById("color_en_pantalla").innerText = d.color;

                const estados = {
                    aceptado: "Conductor asignado",
                    en_camino: "Va hacia ti 🛵",
                    recogido: "En viaje 🚀",
                    cerca: "Está afuera 🚨"
                };

                document.getElementById("estado_titulo").innerText = "Viaje en curso";
                document.getElementById("texto_estado").innerText = estados[d.estado];

                if (d.estado === "cerca" && !alertaMostrada) {
                    alertaCerca();
                    alertaMostrada = true;
                }
            }

        })
        .catch(e => console.log(e))
        .finally(() => ejecutando = false);
    }

    // 🔁 LOOP AUTOMÁTICO
    setInterval(window.vigilarViaje, 3000);

});
</script>

{% endblock %}
