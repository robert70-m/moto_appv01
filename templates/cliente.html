{% extends "base.html" %}

{% block content %}

<div id="mensaje-alerta" style="display:none;" class="alerta">
    <span id="texto-alerta"></span>
</div>

<div class="card">
    <h2>Pedir Moto 🏍️</h2>
    
    {% if request.args.get('error') %}
    <div style="background: #fdeaea; color: #e74c3c; padding: 12px; border-radius: 8px; border: 1px solid #f5c6cb; font-weight: bold; text-align: center; margin: 10px;">
        <i class="fas fa-exclamation-circle"></i> {{ request.args.get('error') }}
    </div>
    {% endif %}

    <form action="/pedir_viaje" method="POST">
        <label style="font-size: 12px; color: #7f8c8d;">Punto de partida:</label>
        <input type="text" id="input_origen" name="origen" placeholder="Selecciona origen en el mapa" readonly required>
        
        <label style="font-size: 12px; color: #7f8c8d; margin-top: 10px; display: block;">Destino:</label>
        <input type="text" id="input_destino" name="destino" placeholder="Selecciona destino en el mapa" readonly required>

        <input type="hidden" id="lat" name="lat">
        <input type="hidden" id="lng" name="lng">
        <input type="hidden" id="lat_destino" name="lat_destino">
        <input type="hidden" id="lng_destino" name="lng_destino">

        <button type="submit" style="margin-top: 20px;">Pedir viaje 🚀</button>
    </form>

    {% if viaje_id %}
    <a href="{{ url_for('cancelar_viaje', id=viaje_id) }}"
       onclick="return confirm('¿Seguro que deseas cancelar el viaje?')">
        <button style="margin-top:10px;background:#e74c3c;color:white;padding:12px;border:none;border-radius:6px;width:100%;">
            ❌ Cancelar Viaje
        </button>
    </a>
    {% endif %}
</div> 

<div id="status_conductor" style="display:none; padding:15px; background:#d4edda; border-radius:10px; margin: 10px 0; border: 1px solid #c3e6cb; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
    <p style="margin:0; color: #155724; font-size: 1.1em;">✅ <b>¡Viaje Aceptado!</b></p>
    <hr style="border: 0; border-top: 1px solid #c3e6cb; margin: 10px 0;">
    
    <p style="margin:5px 0;">👤 <b>Conductor:</b> <span id="nombre_en_pantalla"></span></p>
    
    <div style="display: flex; justify-content: space-between; margin-top: 8px; background: rgba(255,255,255,0.5); padding: 8px; border-radius: 5px;">
        <p style="margin:0;">🔢 <b>Unidad:</b> <span id="unidad_en_pantalla" style="color: #0b2e13; font-weight: bold;"></span></p>
        <p style="margin:0;">🎨 <b>Color:</b> <span id="color_en_pantalla" style="color: #0b2e13; font-weight: bold;"></span></p>
    </div>

    <p style="margin:10px 0 0 0; font-size: 0.9em; text-align: center;">
        Estado: <span id="texto_estado" style="text-transform: uppercase; color: #155724; font-weight: bold; background: #fff; padding: 2px 8px; border-radius: 10px;"></span>
    </p>
</div>

<div class="card" style="padding: 10px;">
    <p style="font-size: 13px; margin-bottom: 5px;">📍 Selecciona tu destino en el mapa:</p>
    <div id="map" style="height: 450px; width: 100%; border-radius: 10px; border: 2px solid #2c3e50;"></div>
</div>

<script>
document.addEventListener("DOMContentLoaded", function() {
    let map = null;
    let marcadorUsuario = null;
    let marcadorDestino = null;
    let primeraVez = true;
    let alertaMostrada = false;

    // --- Iconos de Mapa ---
    const iconoCliente = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/684/684908.png',
        iconSize: [35, 35],
        iconAnchor: [17, 35]
    });

    const iconoDestino = L.icon({
        iconUrl: 'https://cdn-icons-png.flaticon.com/512/447/447031.png',
        iconSize: [35, 35],
        iconAnchor: [17, 35]
    });

    function alertaConductorCerca() {
        let alerta = document.createElement("div");
        alerta.innerHTML = "🚨 El conductor está cerca";
        alerta.style.position = "fixed";
        alerta.style.top = "80px";
        alerta.style.left = "50%";
        alerta.style.transform = "translateX(-50%)";
        alerta.style.background = "#27ae60";
        alerta.style.color = "white";
        alerta.style.padding = "15px 25px";
        alerta.style.borderRadius = "30px";
        alerta.style.fontWeight = "bold";
        alerta.style.zIndex = "9999";
        document.body.appendChild(alerta);
        setTimeout(() => alerta.remove(), 5000);
    }

    function initMap(lat, lng) {
        if (map) return;
        map = L.map('map').setView([lat, lng], 16);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        map.on('click', function(e) {
            let latD = e.latlng.lat;
            let lngD = e.latlng.lng;
            document.getElementById("lat_destino").value = latD;
            document.getElementById("lng_destino").value = lngD;
            document.getElementById("input_destino").value = "Destino marcado ✅";

            if (marcadorDestino) {
                marcadorDestino.setLatLng([latD, lngD]);
            } else {
                marcadorDestino = L.marker([latD, lngD], { icon: iconoDestino }).addTo(map).bindPopup("Destino").openPopup();
            }
        });
    }

    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            document.getElementById("lat").value = lat;
            document.getElementById("lng").value = lng;
            document.getElementById("input_origen").value = "Ubicación Detectada ✅";
            
            if (!map) initMap(lat, lng);
            
            if (marcadorUsuario) {
                marcadorUsuario.setLatLng([lat, lng]);
            } else {
                marcadorUsuario = L.marker([lat, lng], { icon: iconoCliente }).addTo(map).bindPopup("Estás aquí").openPopup();
            }
            if (primeraVez && map) {
                map.setView([lat, lng], 16);
                primeraVez = false;
            }
        });
    }


function vigilarViaje() {
        const idViaje = "{{ viaje_id }}";
        // Buscamos el contenedor o el botón de cancelar
        const botonCancelar = document.querySelector('a[href*="cancelar_viaje"]');

        if (!idViaje || idViaje === "None" || idViaje === "") {
            document.getElementById("status_conductor").style.display = "none";
            return;
        }

        fetch(`/api_estado_viaje/${idViaje}`)
        .then(res => res.json())
        .then(data => {
            if (data.estado === 'finalizado') {
                window.location.href = "/cliente"; 
                return;
            } 
            
            if (['aceptado','en_camino','recogido','cerca'].includes(data.estado)) {
                // --- LÓGICA DE CANCELACIÓN ---
                // Si el viaje ya fue aceptado, ocultamos el botón de cancelar
                if (botonCancelar) {
                    botonCancelar.style.display = "none";
                }
                
                document.getElementById("status_conductor").style.display = "block";
                document.getElementById("nombre_en_pantalla").innerText = data.conductor;
                document.getElementById("unidad_en_pantalla").innerText = data.unidad || "S/N";
                document.getElementById("color_en_pantalla").innerText = data.color || "N/A";
                
                if (data.estado === 'cerca') {
                    if (!alertaMostrada) {
                        alertaConductorCerca();
                        alertaMostrada = true;
                    }
                    document.getElementById("texto_estado").innerText = "Cerca de ti 🚨";
                } else {
                    alertaMostrada = false;
                    document.getElementById("texto_estado").innerText = data.estado;
                }
            } else if (data.estado === 'pendiente') {
                // Si sigue pendiente, nos aseguramos de que el botón sea visible
                if (botonCancelar) {
                    botonCancelar.style.display = "block";
                }
            }
        })
        .catch(err => console.error("Error consultando estado:", err));
    }
    setInterval(vigilarViaje, 3000);
    vigilarViaje();
});
</script>

{% endblock %}
