{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<div class="card" style="height: 85vh; display: flex; flex-direction: column; padding: 5px; margin-bottom: 10px;">
    <h3 style="text-align: center; margin: 10px 0; font-size: 1.4rem;">Viajes en tiempo real 🏍️</h3>
    <div id="map" style="flex-grow: 1; border-radius: 10px; z-index: 1;"></div>
</div>

<style>
    /* Ocultar el panel de instrucciones de ruta */
    .leaflet-routing-container { display: none !important; }

    /* MEJORA MÓVIL: Agrandar botones de zoom de Leaflet */
    .leaflet-control-zoom-in, 
    .leaflet-control-zoom-out {
        width: 44px !important;
        height: 44px !important;
        line-height: 44px !important;
        font-size: 20px !important;
    }

    /* MEJORA MÓVIL: Agrandar el contenido de los popups para que sea legible */
    .leaflet-popup-content {
        font-size: 1.1rem !important;
        min-width: 150px !important;
        text-align: center;
    }

    /* Estilo para el botón de aceptar dentro del mapa */
    .btn-aceptar-mapa {
        background: #27ae60; 
        color: white; 
        padding: 12px; 
        border-radius: 8px; 
        display: block; 
        text-align: center; 
        margin-top: 10px; 
        text-decoration: none; 
        font-weight: bold;
        font-size: 1rem;
        box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
</style>

<script>
let map;
let rutasActivas = [];
let viajeEnCurso = false;

// 🟢 CONFIGURACIÓN DE ICONOS (Agrandados un poco para mejor visibilidad)
const iconVerde = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [30, 50], // Aumentado de [25, 41]
    iconAnchor: [15, 50], 
    popupAnchor: [1, -34], 
    shadowSize: [41, 41]
});

const iconRojo = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [30, 50], // Aumentado de [25, 41]
    iconAnchor: [15, 50], 
    popupAnchor: [1, -34], 
    shadowSize: [41, 41]
});

function initMap() {
    map = L.map('map').setView([16.75, -96.67], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 14);
        });
    }
    // Corregir tamaño al cargar
    setTimeout(() => map.invalidateSize(), 600);
}

function cargarViajes() {
    if (viajeEnCurso) return;

    fetch("/api_viajes")
    .then(res => res.json())
    .then(data => {
        // Limpiar rutas previas
        rutasActivas.forEach(r => map.removeControl(r));
        rutasActivas = [];

        data.viajes.forEach(v => {
            if (v.lat && v.lng && v.lat_destino && v.lng_destino && v.estado === 'pendiente') {
                
                let ruta = L.Routing.control({
                    waypoints: [
                        L.latLng(v.lat, v.lng),
                        L.latLng(v.lat_destino, v.lng_destino)
                    ],
                    createMarker: function(i, wp) {
                        const icon = (i === 0) ? iconVerde : iconRojo;
                        // Mejorado: Botón más grande y fácil de presionar en movimiento
                        const popupText = (i === 0) 
                            ? `<b>Punto de Recogida</b><br>
                               <a href="/aceptar_viaje/${v.id}" 
                                  onclick="viajeEnCurso=true" 
                                  class="btn-aceptar-mapa">
                                  ACEPTAR VIAJE ✅
                               </a>`
                            : `<b>Destino Final</b>`;
                        
                        return L.marker(wp.latLng, { icon: icon }).bindPopup(popupText);
                    },
                    addWaypoints: false,
                    draggableWaypoints: false,
                    show: false,
                    lineOptions: {
                        styles: [{ color: '#3498db', opacity: 0.7, weight: 6 }] // Línea un poco más gruesa
                    }
                }).addTo(map);

                rutasActivas.push(ruta);
            }
        });
    });
}

document.addEventListener("DOMContentLoaded", function() {
    initMap();
    cargarViajes();
    // Refresco cada 15 segundos para no saturar pero mantener datos frescos
    setInterval(cargarViajes, 15000);
});
</script>
{% endblock %}
