{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<div class="card">
    <h2 style="text-align: center;">Viajes Disponibles 🏍️</h2>
    <p style="font-size: 13px; color: #7f8c8d; text-align: center;">
        Los viajes se actualizan automáticamente. La ruta se mantendrá activa durante el servicio.
    </p>
    <div id="map" style="height:500px; border-radius: 15px; border: 2px solid #2c3e50; z-index: 1;"></div>
</div>

<style>
    /* Ocultar el cuadro blanco con instrucciones de direcciones que tapa el mapa */
    .leaflet-routing-container { display: none !important; }
</style>

<script>
let map;
let rutasActivas = [];
let marcadoresActivos = [];
let viajeEnCurso = false; // Nueva variable para bloquear la limpieza si ya aceptaste uno

function initMap() {
    // Inicializar el mapa una sola vez
    map = L.map('map').setView([16.75, -96.67], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Intentar centrar en el conductor
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 14);
        });
    }
}

function cargarViajes() {
    // Si el conductor ya está en un viaje, no borramos la ruta actual
    if (viajeEnCurso) return;

    fetch("/api_viajes")
    .then(res => res.json())
    .then(data => {
        // 1. Limpiar marcadores anteriores
        marcadoresActivos.forEach(m => map.removeLayer(m));
        marcadoresActivos = [];

        // 2. Limpiar rutas anteriores
        rutasActivas.forEach(r => map.removeControl(r));
        rutasActivas = [];

        // 3. Dibujar viajes disponibles
        data.viajes.forEach(v => {
            if(v.lat && v.lng && v.lat_destino && v.lng_destino && v.estado === 'pendiente'){

                // Marcador de origen
                let marker = L.marker([v.lat, v.lng]).addTo(map)
                    .bindPopup(`
                        <b>Viaje #${v.id}</b><br>
                        Destino: ${v.destino}<br><br>
                        <a href="/aceptar_viaje/${v.id}" onclick="setViajeActivo()"
                           style="background:#27ae60; color:white; padding:8px 12px; border-radius:5px; text-decoration:none; display:block; text-align:center; font-weight:bold;">
                           Aceptar Viaje ✅
                        </a>
                    `);
                marcadoresActivos.push(marker);

                // Dibujar la ruta sugerida
                let ruta = L.Routing.control({
                    waypoints: [
                        L.latLng(v.lat, v.lng),
                        L.latLng(v.lat_destino, v.lng_destino)
                    ],
                    createMarker: function() { return null; },
                    addWaypoints: false,
                    draggableWaypoints: false,
                    fitSelectedRoutes: false,
                    show: false,
                    lineOptions: { styles: [{ color: '#3498db', opacity: 0.6, weight: 4 }] }
                }).addTo(map);

                rutasActivas.push(ruta);
            }
        });
    });
}

// Esta función se activa al hacer clic en "Aceptar" para que la ruta no se borre
function setViajeActivo() {
    viajeEnCurso = true;
    // Aquí podrías cambiar el color de la ruta elegida para diferenciarla
}

document.addEventListener("DOMContentLoaded", function() {
    initMap();
    cargarViajes();
    // Actualizar lista de pendientes cada 15 segundos
    setInterval(cargarViajes, 15000);

    // Corregir tamaño del mapa si se ve gris al cargar
    setTimeout(() => map.invalidateSize(), 500);
});
</script>
{% endblock %}
