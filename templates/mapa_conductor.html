{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<div class="card" style="height: 80vh; display: flex; flex-direction: column; padding: 5px;">
    <h3 style="text-align: center; margin: 5px;">Viajes en tiempo real 🏍️</h3>
    <div id="map" style="flex-grow: 1; border-radius: 10px; z-index: 1;"></div>
</div>

<style>
    .leaflet-routing-container { display: none !important; }
</style>

<script>
let map;
let rutasActivas = [];
let viajeEnCurso = false;

// 🟢 CONFIGURACIÓN DE ICONOS
const iconVerde = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
});

const iconRojo = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41], iconAnchor: [12, 41], popupAnchor: [1, -34], shadowSize: [41, 41]
});

function initMap() {
    map = L.map('map').setView([16.75, -96.67], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(pos => {
            map.setView([pos.coords.latitude, pos.coords.longitude], 14);
        });
    }
    // Corregir tamaño al cargar
    setTimeout(() => map.invalidateSize(), 600);
}

function cargarViajes() {
    if (viajeEnCurso) return;

    fetch("/api_viajes")
    .then(res => res.json())
    .then(data => {
        // Limpiar rutas previas
        rutasActivas.forEach(r => map.removeControl(r));
        rutasActivas = [];

        data.viajes.forEach(v => {
            if (v.lat && v.lng && v.lat_destino && v.lng_destino && v.estado === 'pendiente') {
                
                let ruta = L.Routing.control({
                    waypoints: [
                        L.latLng(v.lat, v.lng),
                        L.latLng(v.lat_destino, v.lng_destino)
                    ],
                    createMarker: function(i, wp) {
                        const icon = (i === 0) ? iconVerde : iconRojo;
                        const popupText = (i === 0) 
                            ? `<b>Recoger aquí</b><br><a href="/aceptar_viaje/${v.id}" onclick="viajeEnCurso=true" style="background:green; color:white; padding:8px; border-radius:5px; display:block; text-align:center; margin-top:5px; text-decoration:none;">ACEPTAR ✅</a>`
                            : `<b>Destino</b>`;
                        
                        return L.marker(wp.latLng, { icon: icon }).bindPopup(popupText);
                    },
                    addWaypoints: false,
                    draggableWaypoints: false,
                    show: false,
                    lineOptions: {
                        styles: [{ color: '#3498db', opacity: 0.7, weight: 5 }]
                    }
                }).addTo(map);

                rutasActivas.push(ruta);
            }
        });
    });
}

document.addEventListener("DOMContentLoaded", function() {
    initMap();
    cargarViajes();
    setInterval(cargarViajes, 15000);
});
</script>
{% endblock %}
