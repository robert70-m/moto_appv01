{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<audio id="sonidoNotificacion" src="{{ url_for('static', filename='alerta.mp3') }}" preload="auto"></audio>

<div class="card" style="text-align: center; padding: 15px; margin-bottom: 10px;">
    <h2 style="margin: 5px 0; font-size: 1.5rem;">Panel del Conductor 🏍️</h2>
    <p style="margin: 10px 0;">
        Estado: <strong id="status-text" style="font-size: 1.2rem; color: #27ae60;">En línea 🟢</strong>
    </p>

    <a href="{{ url_for('viajes_disponibles') }}" style="text-decoration: none;">
        <button style="background:#3498db; width:100%; padding:15px; border:none; color:white; border-radius:10px; font-weight:bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            🔎 Ver viajes disponibles
        </button>
    </a>
</div>

<div id="alerta-viaje" class="alerta-viaje" style="display:none;" onclick="detenerAlerta()">
    🚨 NUEVO VIAJE DISPONIBLE 🚨
</div>

<div id="contenedor-viaje-activo" class="card" style="padding: 10px; margin-bottom: 20px;">
    <h3 style="text-align: center; margin-top: 5px;">Control de Viaje Activo</h3>

    {% if viaje %}
    <div id="map_conductor" style="height:50vh; width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd;"></div>
    {% else %}
    <div id="sin-viaje-msg" style="text-align:center; padding:50px; background: #f9f9f9; border-radius: 10px; color: #95a5a6; font-style: italic;">
        No hay viaje activo en este momento
    </div>
    {% endif %}

    <div id="botones-control" style="display:flex; flex-direction:column; gap:12px; position: relative; z-index: 2500; {% if not viaje %}display:none;{% endif %}">

        <button class="btn-estado" onclick="actualizarEstado('en_camino','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or viaje.estado != 'aceptado' %} disabled {% endif %}
        style="background: #f39c12;">
            1. En Camino 🛵
        </button>

        <button class="btn-estado" onclick="actualizarEstado('recogido','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or (viaje.estado != 'en_camino' and viaje.estado != 'aceptado') %} disabled {% endif %}
        style="background: #2980b9;">
            2. Ya lo recogí ✅
        </button>

        <button class="btn-estado" onclick="actualizarEstado('finalizado','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or (viaje.estado != 'recogido' and viaje.estado != 'en_camino') %} disabled {% endif %}
        style="background: #27ae60;">
            3. Finalizar Viaje 🏁
        </button>

    </div>
</div>

<style>
    .btn-estado { width: 100%; padding: 18px; border: none; color: white; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    .btn-estado:active { transform: scale(0.98); }
    .btn-estado:disabled { background: #bdc3c7 !important; box-shadow: none; cursor: not-allowed; opacity: 0.6; }
    .alerta-viaje { position: fixed; top: 0; left: 0; width: 100%; background: #e74c3c; color: white; text-align: center; padding: 25px; font-weight: bold; font-size: 1.3rem; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
</style>

<script>
function actualizarEstado(nuevoEstado, viajeId) {
    if (!viajeId || viajeId === "") return;
    const btn = event.currentTarget;
    btn.innerHTML = "Procesando...";
    btn.disabled = true;

    fetch(`/cambiar_estado_viaje/${viajeId}/${nuevoEstado}`)
    .then(res => res.text())
    .then(txt => {
        if (txt.includes("OK")) {
            if (nuevoEstado === "finalizado") {
                // Redirección limpia al terminar
                window.location.replace("/viajes_disponibles");
            } else {
                location.reload();
            }
        }
    })
    .catch(err => {
        alert("Error de conexión");
        location.reload();
    });
}

{% if viaje %}
let map;
document.addEventListener("DOMContentLoaded", function() {
    const latO = {{ viaje.lat or 0 }};
    const lngO = {{ viaje.lng or 0 }};
    const latD = {{ viaje.lat_destino or 0 }};
    const lngD = {{ viaje.lng_destino or 0 }};

    if (latO && lngO && latD && lngD) {
        map = L.map('map_conductor').setView([latO, lngO], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const iconVerde = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        const iconRojo = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41] });

        L.marker([latO, lngO], {icon: iconVerde}).addTo(map);
        L.marker([latD, lngD], {icon: iconRojo}).addTo(map);

        fetch(`https://router.project-osrm.org/route/v1/driving/${lngO},${latO};${lngD},${latD}?overview=full&geometries=geojson`)
        .then(res => res.json())
        .then(data => {
            if (data.routes && data.routes.length > 0) {
                const ruta = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                const linea = L.polyline(ruta, { color: '#2980b9', weight: 6 }).addTo(map);
                map.fitBounds(linea.getBounds(), {padding:[30,30]});
            }
        });
        setTimeout(() => map.invalidateSize(), 500);
    }
});
{% endif %}

let alertaActiva = false;

function iniciarAlerta() {
    const divAlerta = document.getElementById("alerta-viaje");
    const sonido = document.getElementById("sonidoNotificacion");
    if (!alertaActiva) {
        alertaActiva = true;
        if (divAlerta) divAlerta.style.display = "block";
        if (sonido) { sonido.loop = true; sonido.play().catch(()=>{}); }
    }
}

function detenerAlerta() {
    const divAlerta = document.getElementById("alerta-viaje");
    const sonido = document.getElementById("sonidoNotificacion");
    if (alertaActiva) {
        alertaActiva = false;
        if (divAlerta) divAlerta.style.display = "none";
        if (sonido) { sonido.pause(); sonido.currentTime = 0; }
    }
}

// VIGILANTE FINAL DEL CONDUCTOR
setInterval(function() {
    {% if not viaje %}
        fetch('/api/verificar_viajes')
        .then(res => res.json())
        .then(data => {
            if (data.hay_viajes) { iniciarAlerta(); }
            else { detenerAlerta(); }
        });
    {% else %}
        // Si hay un viaje activo, vigilamos si el cliente lo cancela
        fetch('/api_estado_viaje/{{ viaje.id }}')
        .then(res => res.json())
        .then(data => {
            // Si el estado es cancelado o no existe (borrado de DB)
            if (data.estado === 'cancelado' || data.estado === 'no_existe') {
                // Notificación VISIBLE para el conductor
                alert("🚨 ¡ATENCIÓN! EL CLIENTE CANCELÓ EL VIAJE.");
                // Limpieza total y redirección
                window.location.replace("/viajes_disponibles");
            }
        });
    {% endif %}
}, 4000); 
</script>
{% endblock %}
