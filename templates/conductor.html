{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<audio id="sonidoNotificacion" src="{{ url_for('static', filename='alerta.mp3') }}" preload="auto"></audio>

<div class="card" style="text-align: center; padding: 15px; margin-bottom: 10px;">
    <h2 style="margin: 5px 0; font-size: 1.5rem;">Panel del Conductor 🏍️</h2>
    <p style="margin: 10px 0;">
        Estado: <strong id="status-text" style="font-size: 1.2rem; color: #27ae60;">En línea 🟢</strong>
    </p>

    <a href="{{ url_for('viajes_disponibles') }}" style="text-decoration: none;">
        <button style="background:#3498db; width:100%; padding:15px; border:none; color:white; border-radius:10px; font-weight:bold; font-size: 1.1rem; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            🔎 Ver viajes disponibles
        </button>
    </a>
</div>

<div id="alerta-viaje" class="alerta-viaje" style="display:none;" onclick="detenerAlerta()">
    🚨 NUEVO VIAJE DISPONIBLE 🚨 (Toca para silenciar)
</div>

<div id="contenedor-viaje-activo" class="card" style="padding: 10px; margin-bottom: 20px;">
    <h3 style="text-align: center; margin-top: 5px;">Control de Viaje Activo</h3>

    {% if viaje %}
    <div id="map_conductor" style="height:50vh; width: 100%; border-radius: 10px; margin-bottom: 15px; border: 1px solid #ddd; z-index: 1;"></div>
    {% else %}
    <div id="sin-viaje-msg" style="text-align:center; padding:50px; background: #f9f9f9; border-radius: 10px; color: #95a5a6; font-style: italic;">
        No hay viaje activo en este momento. Ve a "Ver viajes disponibles" para empezar.
    </div>
    {% endif %}

    <div id="botones-control" style="display:flex; flex-direction:column; gap:12px; {% if not viaje %}display:none;{% endif %}">

        <button class="btn-estado" id="btn-en-camino" onclick="actualizarEstado('en_camino','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or viaje.estado != 'aceptado' %} disabled {% endif %}
        style="background: #f39c12;">
            1. En Camino al Cliente 🛵
        </button>

        <button class="btn-estado" id="btn-recogido" onclick="actualizarEstado('recogido','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or (viaje.estado != 'en_camino' and viaje.estado != 'aceptado') %} disabled {% endif %}
        style="background: #2980b9;">
            2. Cliente a Bordo ✅
        </button>

        <button class="btn-estado" id="btn-finalizado" onclick="actualizarEstado('finalizado','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or (viaje.estado != 'recogido' and viaje.estado != 'en_camino') %} disabled {% endif %}
        style="background: #27ae60;">
            3. Finalizar y Cobrar 🏁
        </button>
    </div>
</div>

<style>
    .btn-estado { width: 100%; padding: 18px; border: none; color: white; border-radius: 12px; font-weight: bold; font-size: 1.2rem; cursor: pointer; transition: background 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
    .btn-estado:disabled { background: #bdc3c7 !important; cursor: not-allowed; opacity: 0.6; box-shadow: none; }
    .alerta-viaje { position: fixed; top: 0; left: 0; width: 100%; background: #e74c3c; color: white; text-align: center; padding: 25px; font-weight: bold; font-size: 1.3rem; z-index: 9999; box-shadow: 0 5px 15px rgba(0,0,0,0.3); animation: pulse 1s infinite; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
</style>

<script>
// Función para cambiar los estados del viaje (API)
function actualizarEstado(nuevoEstado, viajeId) {
    if (!viajeId || viajeId === "") return;
    
    // Bloqueamos TODOS los botones para evitar doble clic accidental
    const botones = document.querySelectorAll('.btn-estado');
    botones.forEach(b => b.disabled = true);

    fetch(`/cambiar_estado_viaje/${viajeId}/${nuevoEstado}`, {
        method: "POST"
    })
    .then(res => res.json()) 
    .then(data => {
        if (data.status === "ok" || data.status === "OK") {
            if (nuevoEstado === "finalizado") {
                window.location.replace("/viajes_disponibles");
            } else {
                location.reload();
            }
        } else {
            alert("Error: " + (data.message || "No se pudo actualizar"));
            location.reload(); // Recargamos para refrescar estados reales
        }
    })
    .catch(err => {
        alert("Error de conexión. Verifica tu internet.");
        location.reload();
    });
}


// Inicialización del Mapa del Conductor
{% if viaje %}
let map;
document.addEventListener("DOMContentLoaded", function() {
    const latO = {{ viaje.lat or 0 }};
    const lngO = {{ viaje.lng or 0 }};
    const latD = {{ viaje.lat_destino or 0 }};
    const lngD = {{ viaje.lng_destino or 0 }};

    if (latO && lngO && latD && lngD) {
        map = L.map('map_conductor').setView([latO, lngO], 14);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const iconVerde = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', iconSize: [25, 41], iconAnchor: [12, 41] });
        const iconRojo = L.icon({ iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png', iconSize: [25, 41], iconAnchor: [12, 41] });

        L.marker([latO, lngO], {icon: iconVerde}).addTo(map).bindPopup("Punto de Recogida");
        L.marker([latD, lngD], {icon: iconRojo}).addTo(map).bindPopup("Destino Final");

        // Dibujar la ruta sugerida
        fetch(`https://router.project-osrm.org/route/v1/driving/${lngO},${latO};${lngD},${latD}?overview=full&geometries=geojson`)
        .then(res => res.json())
        .then(data => {
            if (data.routes && data.routes.length > 0) {
                const ruta = data.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
                const linea = L.polyline(ruta, { color: '#2980b9', weight: 6, opacity: 0.7 }).addTo(map);
                map.fitBounds(linea.getBounds(), {padding:[40,40]});
            }
        });
        
        // Corregir tamaño del mapa tras carga inicial
        setTimeout(() => { map.invalidateSize(); }, 800);
    }
});
{% endif %}

// Lógica de Alertas y Vigilante
let alertaActiva = false;

function iniciarAlerta() {
    const divAlerta = document.getElementById("alerta-viaje");
    const sonido = document.getElementById("sonidoNotificacion");
    if (!alertaActiva) {
        alertaActiva = true;
        if (divAlerta) divAlerta.style.display = "block";
        if (sonido) { 
            sonido.loop = true; 
            sonido.play().catch(() => { console.log("Interacción requerida para audio"); }); 
        }
    }
}

function detenerAlerta() {
    const divAlerta = document.getElementById("alerta-viaje");
    const sonido = document.getElementById("sonidoNotificacion");
    if (alertaActiva) {
        alertaActiva = false;
        if (divAlerta) divAlerta.style.display = "none";
        if (sonido) { sonido.pause(); sonido.currentTime = 0; }
    }
}

// Vigilante de cancelaciones y nuevos viajes
// Vigilante de cancelaciones y nuevos viajes
setInterval(function() {
    {% if viaje %}
        // Usamos la ruta ligera que creamos en el servidor para mayor velocidad
        fetch('/api_verificar_status_viaje/{{ viaje.id }}')
        .then(res => res.json())
        .then(data => {
            // Si el estado cambió a cancelado o ya no existe en DB
            if (data.estado === 'cancelado' || data.status === 'eliminado') {
                alert("🚨 ¡ATENCIÓN! EL CLIENTE HA CANCELADO EL VIAJE.");
                window.location.replace("/viajes_disponibles");
            }
            // Si por error de sistema otro conductor lo tomó (prevención doble)
            else if (data.conductor_id && data.conductor_id != "{{ session['user_id'] }}") {
                alert("🚫 Este viaje ya no te pertenece.");
                window.location.replace("/viajes_disponibles");
            }
        })
        .catch(e => console.log("Reconectando radar..."));
    {% else %}
        // Lógica para buscar nuevos viajes cuando el chofer está libre
        fetch('/api/verificar_viajes')
        .then(res => res.json())
        .then(data => {
            if (data.hay_viajes) { iniciarAlerta(); }
            else { detenerAlerta(); }
        })
        .catch(() => {});
    {% endif %}
}, 1500); // 1.5 segundos es el punto dulce entre rapidez y no saturar el server
</script>
{% endblock %}
