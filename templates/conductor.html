{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<audio id="sonidoNotificacion" src="{{ url_for('static', filename='alerta.mp3') }}" preload="auto"></audio>

<div class="card" style="text-align: center; padding: 10px; margin-bottom: 10px;">
    <h2 style="margin: 5px 0;">Panel del Conductor 🏍️</h2>
    <p style="color: #7f8c8d; margin: 5px 0;">
        Estado: <strong id="status-text">En línea 🟢</strong>
    </p>

    <a href="{{ url_for('viajes_disponibles') }}" style="text-decoration: none;">
        <button style="background: #3498db; width: 100%; padding: 10px; border: none; color: white; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;">
            🔎 Ver viajes disponibles
        </button>
    </a>
</div>

<div id="alerta-viaje" class="alerta-viaje" style="display:none;" onclick="detenerAlerta()">
    🚨 NUEVO VIAJE DISPONIBLE 🚨 <br> <small>(Toca aquí para silenciar)</small>
</div>

<div class="card" style="padding: 10px;">
    <h3 style="text-align: center; margin-bottom: 10px;">Control de Viaje Activo</h3>
    
    {% if viaje %}
    <div id="map_conductor" style="height: 60vh; width: 100%; border-radius: 12px; margin-bottom: 15px; border: 2px solid #2c3e50; z-index: 1;"></div>
    {% else %}
    <div style="text-align: center; padding: 30px; border: 2px dashed #ccc; border-radius: 10px; color: #7f8c8d; margin-bottom: 15px;">
        <p>No hay un viaje activo seleccionado.</p>
    </div>
    {% endif %}

    <div style="display: flex; flex-direction: column; gap: 10px;">
        <button onclick="actualizarEstado('en_camino', '{{ viaje.id if viaje else '' }}')" 
                style="background:#f39c12; color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; font-size: 16px;"
                {% if not viaje or viaje.estado != 'aceptado' %} disabled {% endif %}>
            En Camino al Cliente 🛵
        </button>
        
        <button onclick="actualizarEstado('recogido', '{{ viaje.id if viaje else '' }}')" 
                style="background:#9b59b6; color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; font-size: 16px;"
                {% if not viaje or viaje.estado != 'en_camino' %} disabled {% endif %}>
            Cliente Recogido ✅
        </button>
        
        <button onclick="actualizarEstado('finalizado', '{{ viaje.id if viaje else '' }}')" 
                style="background:#e74c3c; color:white; padding:15px; border:none; border-radius:8px; font-weight:bold; font-size: 16px;"
                {% if not viaje or viaje.estado != 'recogido' %} disabled {% endif %}>
            Finalizar Viaje 🏁
        </button>
    </div>
</div>

<style>
.alerta-viaje {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    background: #e74c3c;
    color: white;
    text-align: center;
    padding: 25px;
    font-size: 20px;
    font-weight: bold;
    z-index: 9999;
    animation: parpadeo 1s infinite;
    cursor: pointer;
}
@keyframes parpadeo {
    0% { opacity: 1; }
    50% { opacity: 0.7; }
    100% { opacity: 1; }
}
button:disabled {
    background: #bdc3c7 !important;
    cursor: not-allowed;
    opacity: 0.6;
}
.leaflet-routing-container {
    display: none !important;
}
</style>

<script>
// ICONOS
const iconVerde = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41]
});

const iconRojo = L.icon({
    iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
    shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
    iconSize: [25, 41],
    iconAnchor: [12, 41]
});

// MAPA
{% if viaje %}
document.addEventListener("DOMContentLoaded", function() {
    try {
        const latO = {{ viaje.lat or 0 }};
        const lngO = {{ viaje.lng or 0 }};
        const latD = {{ viaje.lat_destino or 0 }};
        const lngD = {{ viaje.lng_destino or 0 }};

        if (!latO || !latD) return;

        const map = L.map('map_conductor').setView([latO, lngO], 15);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        L.Routing.control({
            waypoints: [
                L.latLng(latO, lngO),
                L.latLng(latD, lngD)
            ],
            lineOptions: {
                styles: [{ color: '#2980b9', opacity: 0.8, weight: 6 }]
            },
            addWaypoints: false,
            draggableWaypoints: false,
            show: false,
            createMarker: function(i, wp) {
                return L.marker(wp.latLng, {
                    icon: i === 0 ? iconVerde : iconRojo
                }).bindPopup(i === 0 ? "📍 Recoger Cliente" : "🏁 Destino");
            }
        }).addTo(map);

        setTimeout(() => map.invalidateSize(), 500);

    } catch (e) {
        console.error("Error mapa:", e);
    }
});
{% endif %}

// ESTADO
function actualizarEstado(nuevoEstado, viajeId) {
    if (!viajeId) {
        alert("No hay viaje activo.");
        return;
    }

    fetch(`/cambiar_estado_viaje/${viajeId}/${nuevoEstado}`)
    .then(res => {
        if (res.ok) {
            window.location.href = nuevoEstado === 'finalizado'
                ? "{{ url_for('viajes_disponibles') }}"
                : "{{ url_for('conductor') }}";
        } else {
            alert("Error al actualizar estado");
        }
    })
    .catch(() => alert("Error de conexión"));
}

// GPS (con manejo de error)
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(
        pos => {
            let fd = new FormData();
            fd.append("lat", pos.coords.latitude);
            fd.append("lng", pos.coords.longitude);

            fetch("{{ url_for('actualizar_ubicacion') }}", {
                method: "POST",
                body: fd
            });
        },
        err => {
            console.log("GPS no disponible");
        },
        { enableHighAccuracy: true }
    );
}

// ALERTA NUEVOS VIAJES
let alertaActiva = false;
let intervaloSonido;
let ultimoId = 0;

function iniciarAlerta() {
    if (alertaActiva) return;

    alertaActiva = true;
    document.getElementById("alerta-viaje").style.display = "block";

    const sonido = document.getElementById("sonidoNotificacion");

    intervaloSonido = setInterval(() => {
        sonido.play().catch(()=>{});
    }, 2000);
}

function detenerAlerta() {
    alertaActiva = false;
    document.getElementById("alerta-viaje").style.display = "none";
    clearInterval(intervaloSonido);
}

setInterval(() => {
    {% if not viaje %}
    fetch(`{{ url_for('verificar_viajes') }}?ultimo_id=${ultimoId}`)
    .then(r => r.json())
    .then(data => {
        if (data.nuevo_viaje) {
            iniciarAlerta();
            ultimoId = data.id;
        }
    })
    .catch(()=>{});
    {% endif %}
}, 5000);

// CANCELACIONES
let ultimoCancelado = 0;

setInterval(() => {
    fetch(`{{ url_for('verificar_cancelaciones') }}?ultimo_id=${ultimoCancelado}`)
    .then(r => r.json())
    .then(data => {
        if (data.cancelado) {
            alert("❌ El cliente canceló el viaje");
            ultimoCancelado = data.id;
            window.location.href = "{{ url_for('viajes_disponibles') }}";
        }
    })
    .catch(()=>{});
}, 4000);

</script>

{% endblock %}
