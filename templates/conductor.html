{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<audio id="sonidoNotificacion" src="{{ url_for('static', filename='alerta.mp3') }}" preload="auto"></audio>

<div class="card" style="text-align: center;">
    <h2>Panel del Conductor 🏍️</h2>
    <p style="color: #7f8c8d;">Estado actual: <strong id="status-text">En línea 🟢</strong></p>
    
    <a href="/viajes_disponibles">
        <button style="background: #3498db; width: 100%; padding: 12px; border: none; color: white; border-radius: 5px; font-weight: bold; cursor: pointer;">
            🔎 Ver viajes disponibles
        </button>
    </a>
</div>

<div id="alerta-viaje" class="alerta-viaje" style="display:none;" onclick="detenerAlerta()">
    🚨 NUEVO VIAJE DISPONIBLE 🚨 <br> <small>(Toca aquí para silenciar)</small>
</div>

<div class="card">
    <h3 style="text-align: center; margin-bottom: 15px;">Control de Viaje Activo</h3>
    
    {% if viaje %}
    <div id="map_conductor" style="height: 350px; width: 100%; border-radius: 10px; margin-bottom: 20px; border: 2px solid #2c3e50;"></div>
    {% else %}
    <div style="text-align: center; padding: 20px; border: 1px dashed #ccc; border-radius: 10px; color: #7f8c8d;">
        <p>No hay un viaje activo seleccionado.</p>
    </div>
    {% endif %}

    <div style="display: flex; flex-direction: column; gap: 12px;">
        <button id="btn_camino" onclick="actualizarEstado('en_camino', '{{ viaje.id if viaje else '' }}')" 
                style="background:#f39c12; color:white; padding:18px; border:none; border-radius:8px; font-weight:bold;"
                {% if not viaje or viaje.estado != 'aceptado' %} disabled {% endif %}>
            En Camino al Cliente 🛵
        </button>
        
        <button id="btn_recogido" onclick="actualizarEstado('recogido', '{{ viaje.id if viaje else '' }}')" 
                style="background:#9b59b6; color:white; padding:18px; border:none; border-radius:8px; font-weight:bold;"
                {% if not viaje or viaje.estado != 'en_camino' %} disabled {% endif %}>
            Cliente Recogido ✅
        </button>
        
        <button id="btn_finalizado" onclick="actualizarEstado('finalizado', '{{ viaje.id if viaje else '' }}')" 
                style="background:#e74c3c; color:white; padding:18px; border:none; border-radius:8px; font-weight:bold;"
                {% if not viaje or viaje.estado != 'recogido' %} disabled {% endif %}>
            Finalizar Viaje 🏁
        </button>
    </div>
</div>

<style>
.alerta-viaje {
    position: fixed; top: 0; left: 0; width: 100%; background: #e74c3c; color: white;
    text-align: center; padding: 25px; font-size: 20px; font-weight: bold; z-index: 9999;
    animation: parpadeo 1s infinite; cursor: pointer;
}
@keyframes parpadeo { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
button:disabled { background: #bdc3c7 !important; cursor: not-allowed; opacity: 0.6; }

/* Ocultar el panel de instrucciones de texto del enrutamiento para que no estorbe */
.leaflet-routing-container { display: none !important; }
</style>

<script>
// --- 1. LÓGICA DEL MAPA CON RUTAS REALES ---
{% if viaje %}
document.addEventListener("DOMContentLoaded", function() {
    try {
        var latO = {{ viaje.lat or 0 }};
        var lngO = {{ viaje.lng or 0 }};
        var latD = {{ viaje.lat_destino or 0 }};
        var lngD = {{ viaje.lng_destino or 0 }};

        if (latO === 0 || latD === 0) return;

        var map = L.map('map_conductor').setView([latO, lngO], 15);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Control de enrutamiento para trazar por calles
        L.Routing.control({
            waypoints: [
                L.latLng(latO, lngO),
                L.latLng(latD, lngD)
            ],
            lineOptions: {
                styles: [{color: 'blue', opacity: 0.7, weight: 6}]
            },
            addWaypoints: false,
            draggableWaypoints: false,
            show: false,
            createMarker: function(i, wp, nWps) {
                if (i === 0) return L.marker(wp.latLng).bindPopup("Recoger Cliente");
                return L.marker(wp.latLng).bindPopup("Destino del Viaje");
            }
        }).addTo(map);

    } catch (e) {
        console.error("Error al cargar el mapa con ruta:", e);
    }
});
{% endif %}

// --- 2. ACTUALIZAR ESTADOS ---
function actualizarEstado(nuevoEstado, viajeId) {
    if (!viajeId || viajeId === "" || viajeId === "None") {
        alert("Atención: No se encontró el ID del viaje activo.");
        return;
    }

    fetch(`/cambiar_estado_viaje/${viajeId}/${nuevoEstado}`)
        .then(response => {
            if (response.ok) {
                if (nuevoEstado === 'finalizado') {
                    window.location.href = "/viajes_disponibles";
                } else {
                    window.location.href = "/conductor";
                }
            } else {
                alert("Error en el servidor al intentar cambiar el estado.");
            }
        })
        .catch(err => {
            console.error("Error de Fetch:", err);
            alert("Error de conexión.");
        });
}

// --- 3. RASTREO GPS ---
if (navigator.geolocation) {
    navigator.geolocation.watchPosition(function(pos) {
        const lat = pos.coords.latitude;
        const lng = pos.coords.longitude;

        let formData = new FormData();
        formData.append("lat", lat);
        formData.append("lng", lng);

        fetch("/actualizar_ubicacion", {
            method: "POST",
            body: formData
        }).catch(err => console.log("Error sincronizando GPS"));
    }, null, { enableHighAccuracy: true });
}

// --- 4. ALERTAS DE NUEVO VIAJE ---
let alertaActiva = false;
let intervaloSonido;

function iniciarAlerta() {
    if (alertaActiva) return;
    alertaActiva = true;
    document.getElementById("alerta-viaje").style.display = "block";
    
    const sonido = document.getElementById("sonidoNotificacion");
    intervaloSonido = setInterval(() => {
        sonido.play().catch(e => console.log("Interacción requerida para audio"));
    }, 2000);
}

function detenerAlerta() {
    alertaActiva = false;
    document.getElementById("alerta-viaje").style.display = "none";
    clearInterval(intervaloSonido);
}

setInterval(() => {
    {% if not viaje %}
    fetch("/verificar_viajes")
        .then(res => res.json())
        .then(data => { if (data.nuevo_viaje) iniciarAlerta(); });
    {% endif %}
}, 5000);
</script>
{% endblock %}
