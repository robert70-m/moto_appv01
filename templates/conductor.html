{% extends "base.html" %}

{% block content %}
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>

<audio id="sonidoNotificacion" src="{{ url_for('static', filename='alerta.mp3') }}" preload="auto"></audio>

<div class="card" style="text-align: center; padding: 10px; margin-bottom: 10px;">
    <h2 style="margin: 5px 0;">Panel del Conductor 🏍️</h2>
    <p style="color: #7f8c8d; margin: 5px 0;">
        Estado: <strong id="status-text">En línea 🟢</strong>
    </p>

    <a href="{{ url_for('viajes_disponibles') }}">
        <button style="background:#3498db;width:100%;padding:10px;border:none;color:white;border-radius:5px;font-weight:bold;">
            🔎 Ver viajes disponibles
        </button>
    </a>
</div>

<div id="alerta-viaje" class="alerta-viaje" style="display:none;" onclick="detenerAlerta()">
    🚨 NUEVO VIAJE DISPONIBLE 🚨
</div>

<div class="card" style="padding: 10px;">
    <h3 style="text-align: center;">Control de Viaje Activo</h3>

    {% if viaje %}
    <div id="map_conductor" style="height:60vh;"></div>
    {% else %}
    <div style="text-align:center;padding:30px;">No hay viaje activo</div>
    {% endif %}

    <div style="display:flex;flex-direction:column;gap:10px;">

        <button onclick="actualizarEstado('en_camino','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or viaje.estado != 'aceptado' %} disabled {% endif %}>
        En Camino 🛵
        </button>

        <button onclick="actualizarEstado('recogido','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or viaje.estado != 'en_camino' %} disabled {% endif %}>
        Recogido ✅
        </button>

        <button onclick="actualizarEstado('finalizado','{{ viaje.id if viaje else '' }}')"
        {% if not viaje or viaje.estado != 'recogido' %} disabled {% endif %}>
        Finalizar 🏁
        </button>

    </div>
</div>

<style>
button:disabled {
    background:#bdc3c7;
}
.alerta-viaje {
    position:fixed;
    top:0;
    width:100%;
    background:red;
    color:white;
    text-align:center;
    padding:20px;
}
</style>

<script>

// 🔴 ESTADO (ARREGLADO BIEN)
function actualizarEstado(nuevoEstado, viajeId) {
    if (!viajeId) {
        alert("No hay viaje activo");
        return;
    }

    fetch(`/cambiar_estado_viaje/${viajeId}/${nuevoEstado}`)
    .then(res => res.text())
    .then(txt => {
        if (txt === "OK") {

            if (nuevoEstado === "finalizado") {
                window.location.href = "/viajes_disponibles";
            } else {
                location.reload();
            }

        } else {
            alert("Error al actualizar");
        }
    })
    .catch(()=> alert("Error conexión"));
}


// 🗺️ MAPA COMPLETO (CON MARCADORES)
{% if viaje %}
document.addEventListener("DOMContentLoaded", function() {

    const latO = {{ viaje.lat or 0 }};
    const lngO = {{ viaje.lng or 0 }};
    const latD = {{ viaje.lat_destino or 0 }};
    const lngD = {{ viaje.lng_destino or 0 }};

    if (!latO || !lngO || !latD || !lngD) return;

    const map = L.map('map_conductor').setView([latO, lngO], 14);

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // 🟢 ORIGEN
    const iconVerde = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25,41],
        iconAnchor: [12,41]
    });

    L.marker([latO, lngO], {icon: iconVerde})
        .addTo(map)
        .bindPopup("📍 Recoger cliente");

    // 🔴 DESTINO
    const iconRojo = L.icon({
        iconUrl: 'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',
        shadowUrl: 'https://cdnjs.cloudflare.com/ajax/libs/leaflet/0.7.7/images/marker-shadow.png',
        iconSize: [25,41],
        iconAnchor: [12,41]
    });

    L.marker([latD, lngD], {icon: iconRojo})
        .addTo(map)
        .bindPopup("🏁 Destino");

    // 🛣️ RUTA
    fetch(`https://router.project-osrm.org/route/v1/driving/${lngO},${latO};${lngD},${latD}?overview=full&geometries=geojson`)
    .then(res => res.json())
    .then(data => {
        if (!data.routes || data.routes.length === 0) return;

        const coords = data.routes[0].geometry.coordinates;
        const ruta = coords.map(c => [c[1], c[0]]);

        const linea = L.polyline(ruta, {
            color: '#2980b9',
            weight: 6
        }).addTo(map);

        map.fitBounds(linea.getBounds(), {padding:[20,20]});
    });

});
{% endif %}


// 🔊 ALERTAS
let alerta = false;

function iniciarAlerta() {
    if (alerta) return;
    alerta = true;
    document.getElementById("alerta-viaje").style.display="block";
}

function detenerAlerta() {
    alerta = false;
    document.getElementById("alerta-viaje").style.display="none";
}

</script>

{% endblock %}
