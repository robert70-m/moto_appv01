{% extends "base.html" %}

{% block content %}

<h2>Viajes Disponibles</h2>
{% if viajes %}
    {% for viaje in viajes %}
        <div style="border:1px solid #ccc; margin:10px; padding:10px; border-radius:8px;">

            <p><b>{{ viaje.origen }} → {{ viaje.destino }}</b></p>

            <!-- MAPA -->
            <div id="map_{{ viaje.id }}" style="height:200px; margin-bottom:10px;"></div>

            <!-- BOTÓN -->
            <a href="{{ url_for('aceptar_viaje', viaje_id=viaje.id) }}">
                <button style="background:#27ae60;color:white;padding:10px;border:none;border-radius:5px;width:100%;">
                    ACEPTAR VIAJE
                </button>
            </a>

        </div>
    {% endfor %}
{% else %}
    <p>No hay viajes</p>
{% endif %}

<script>
document.addEventListener("DOMContentLoaded", function() {

    {% for viaje in viajes %}

    var latO = {{ viaje.lat or 0 }};
    var lngO = {{ viaje.lng or 0 }};
    var latD = {{ viaje.lat_destino or 0 }};
    var lngD = {{ viaje.lng_destino or 0 }};

    if (latO && latD) {
        var map = L.map('map_{{ viaje.id }}').setView([latO, lngO], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        L.marker([latO, lngO]).addTo(map);
        L.marker([latD, lngD]).addTo(map);

        // 🔥 RUTA REAL CON OSRM
        fetch(`https://router.project-osrm.org/route/v1/driving/${lngO},${latO};${lngD},${latD}?overview=full&geometries=geojson`)
        .then(res => res.json())
        .then(data => {

            if (data.routes && data.routes.length > 0) {

                let coords = data.routes[0].geometry.coordinates;

                let ruta = coords.map(c => [c[1], c[0]]);

                let polyline = L.polyline(ruta, {
                    color: 'blue',
                    weight: 5
                }).addTo(map);

                map.fitBounds(polyline.getBounds());

            } else {
                console.log("No se encontró ruta");
            }

        })
        .catch(err => console.log("Error ruta:", err));
    }

    {% endfor %}

});
</script>

{% endblock %}
