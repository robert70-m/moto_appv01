{% extends "base.html" %}

{% block content %}

<h2>Viajes Disponibles</h2>

{% if viajes %}
    {% for viaje in viajes %}
        <div style="border:1px solid #ccc; margin:10px; padding:10px;">
            <p>{{ viaje.origen }} → {{ viaje.destino }}</p>
        </div>
    {% endfor %}
{% else %}
    <p>No hay viajes</p>
{% endif %}

{% endblock %}
